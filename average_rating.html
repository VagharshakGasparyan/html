<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>English</title>
    <style>
        :root {
            --bg: #112233;
            --c: #dddddd;
            --c1: #5f5;
            --c2: #7af;
            --c3: #a70;
            --c4: #f59;
            --c5: #ff4;
            --bd: #fff2;
            --bd1: #fff4;
        }
        ::selection {
            background: #f07;
            color: #ff0;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-family: Consolas, sans-serif;
            background-color: var(--bg);
            color: var(--c);
        }
        body{
            margin: 0;
        }
        .content {
            max-width: 100vw;
            width: max-content;
            margin: 0 auto;
        }

        .table {
            border-collapse: collapse;
            font-size: 14px;
        }

        .table td, .table th {
            border: 1px solid var(--bd);
            padding: 3px 5px;
        }

        .table tbody tr td {
            position: relative;
        }

        #test_table.table tbody tr td:nth-child(1) {
            color: var(--c1);
        }

        #test_table.table tbody tr td:nth-child(2) {
            color: var(--c);
        }

        #test_table.table tbody tr td:nth-child(3) {
            color: var(--c1);
            text-align: center;
        }

        #test_table.table tbody tr td:nth-child(4) {
            color: var(--c2);
        }

        #test_table.table tbody tr td:nth-child(5) {
            color: var(--c3);
        }
        .copy {
            border: 2px solid var(--c);
            position: absolute;
            top: 0;
            right: 0;
            width: 15px;
            height: 20px;
            background-color: var(--bd);
            cursor: pointer;
        }

        .copy:hover {
            background-color: var(--c1);
        }

        .copy:active {
            background-color: var(--c2);
        }

        select {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd);
            outline: none;
        }

        #variants {
            min-width: 200px;
        }

        button {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd);
            outline: none;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--bd);
        }

        button:active {
            background-color: var(--c);
            color: var(--bg);
        }

        .info-items {
            border: 1px solid var(--bd);
            font-size: 14px;
            padding: 2px 5px;
        }

        #ppf tbody td {
            white-space: pre-line;
        }

        c1 {
            color: var(--c1);
        }

        c2 {
            color: var(--c2);
        }

        c3 {
            color: var(--c3);
        }

        c4 {
            color: var(--c4);
        }

        c5 {
            color: var(--c5);
        }

        c1, c2, c3, c4, c5 {
            display: inline-block;
        }
        #variants{
            font-size: 18px;
            min-width: 100px;
        }
        .hy_tr{
            color: var(--c3);
            display: inline-block;
            padding-right: 7px;
        }
        .mtr td:first-of-type{
            cursor: pointer;
        }
        .mtr:hover td:first-of-type{
            background-color: #fff2;
            /*color: var(--bg) !important;*/
        }
        .mtr_c{
            background-color: #fff2;
        }
        #btn1{
            width: 100px;
            height: 50px;
            background-color: white;
            color: black;
        }
        #btn1:active{
            background-color: black;
            color: white;
        }
        .thick_border_left{
            border-left: 2px solid var(--bd1) !important;
        }
        .thick_border_right{
            border-right: 2px solid var(--bd1) !important;
        }
        .thick_border_bottom{
            border-bottom: 2px solid var(--bd1) !important;
        }
        .thick_border_top{
            border-top: 2px solid var(--bd1) !important;
        }
        .header{
            display: flex;
            position: sticky;
            top: 5px;
            align-items: stretch;
            justify-content: center;
            margin-top: 5px;
            gap: 5px;
            border-bottom: 1px solid var(--c);
            z-index: 999;
        }
        .header .header_btn{
            cursor: pointer;
            padding: 2px 10px;
            border-top: 1px solid var(--c);
            border-left: 1px solid var(--c);
            border-right: 1px solid var(--c);
            border-bottom: 1px solid var(--bg);
            border-radius: 10px 10px 0 0;
            margin-bottom: -1px;
            user-select: none;
            background-color: var(--bg);
        }
        .header .header_btn:hover{
            background-color: var(--bd);
        }
        .display_none{
            display: none !important;
        }
    </style>


</head>
<body>

<div class="content" style="padding-bottom: 20px;margin-top:15px">
    <div style="display: flex;">
        <div id="numeric_main_content" style="padding: 0 5px;color: var(--c2)"></div>
        <div style="border: 1px solid var(--c);min-height: 21px;min-width: 50px;padding: 0 10px;" contenteditable="true" id="main_content"></div>
        <div id="average_main_content" style="padding: 0 5px; color: var(--c1)"></div>
    </div>

</div>


<script>
    window.addEventListener('load', function () {
        let main_content = document.getElementById('main_content');
        let numeric_main_content = document.getElementById('numeric_main_content');
        let average_main_content = document.getElementById('average_main_content');

        main_content.addEventListener('input', function (e) {

            let t = main_content.innerText;
            let tArr = t.split(/\n+/ig);
            let arr_numeric_main_content = [];
            let arr_average_main_content = [];
            tArr.forEach(function (t1,index) {
                let sum = 0;
                let average = 0;
                let count = 0;
                for(let i = 0; i < t1.length; i++) {
                    let c = parseInt(t1[i]);
                    if(isNaN(c)) {
                        continue;
                    }
                    if(c === 1 && i < (t1.length - 1) && parseInt(t1[i + 1]) === 0){
                        c = 10;
                        i++;
                    }
                    count ++;
                    sum += c;
                }
                if(count === 0) {
                    return;
                }
                average = sum / count;
                arr_numeric_main_content.push((index + 1).toString());
                let p = "քանակ " + count + ", միջինը = " + average.toFixed(2).toString() + " ~ <span style='color: var(--c5)'>" + Math.round(average).toString() + "</span>";
                arr_average_main_content.push(p);
            });
            numeric_main_content.innerHTML = arr_numeric_main_content.join('<br>');
            average_main_content.innerHTML = arr_average_main_content.join('<br>');

            console.log(tArr);
        });




    });
</script>
</body>
</html>
