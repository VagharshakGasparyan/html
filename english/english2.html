<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>English Oxfords Words</title>
    <style>
        :root {
            --bg: #112233;
            --c: #dddddd;
            --c1: #5f5;
            --c2: #7af;
            --c3: #a70;
            --c4: #f59;
            --c5: #ff4;
            --bd: #fff2;
            --bd1: #fff4;
        }

        ::selection {
            background: #f07;
            color: #ff0;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-family: Consolas, sans-serif;
            background-color: var(--bg);
            color: var(--c);
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: var(--c5);
            font-size: 20px;
            margin: 15px 0 10px 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px auto;
            position: sticky;
            top: 0;
            z-index: 999;
            background-color: var(--bg);
            padding: 10px 0;
            border-bottom: 1px solid var(--bd);
            flex-wrap: wrap;
            max-width: 900px;
        }

        #search {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd1);
            padding: 6px 30px 6px 15px;
            font-size: 15px;
            font-family: Consolas, sans-serif;
            outline: none;
            width: 280px;
            border-radius: 4px;
            transition: border-color 0.15s ease-in-out;
        }

        .search-container {
            position: relative;
            display: inline-block;
        }

        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--bd1);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: none;
            transition: color 0.15s ease;
            line-height: 1;
        }

        .clear-btn:hover {
            color: var(--c4);
        }

        #search:focus {
            border-color: var(--c2);
        }

        #count {
            color: var(--c3);
            font-size: 14px;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .pagination button {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd);
            padding: 0 4px;
            cursor: pointer;
            font-family: Consolas, sans-serif;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .pagination button:hover {
            background-color: var(--bd1);
        }

        .pagination button.active {
            background-color: var(--c2);
            color: var(--bg);
            border-color: var(--c2);
            font-weight: bold;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .pagination span {
            color: var(--c);
            padding: 0 0;
            font-family: Consolas, sans-serif;
            font-size: 14px;
            user-select: none;
        }

        .table {
            border-collapse: collapse;
            font-size: 14px;
            margin: 15px auto;
            width: 100%;
            max-width: 900px;
        }

        .table th {
            border: 1px solid var(--bd1);
            padding: 8px 12px;
            color: var(--c5);
            position: sticky;
            top: 50px;
            background-color: var(--bg);
            z-index: 998;
        }

        .table td {
            border: 1px solid var(--bd);
            padding: 6px 12px;
        }

        .table tbody tr:hover {
            background-color: #fff1;
        }

        .table tbody tr td:nth-child(1) {
            color: var(--c3);
            text-align: right;
            width: 60px;
        }

        .table tbody tr td:nth-child(2) {
            color: var(--c1);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s ease;
        }

        .table tbody tr td:nth-child(2):hover {
            color: var(--c5);
            text-decoration: underline;
        }

        .table tbody tr td:nth-child(3) {
            color: var(--c);
        }

        .table tbody tr td:nth-child(4) {
            color: var(--c2);
        }
    </style>
</head>

<body>
    <h1>Oxfords 3000 Words</h1>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="search" placeholder="Search / Որոնել...">
            <button id="clear_btn" class="clear-btn" type="button" title="Clear search / Ջնջել որոնումը">✕</button>
        </div>
        <span id="count"></span>
        <div class="pagination" id="pagination"></div>
    </div>

    <table class="table" id="words_table">
        <thead>
            <tr>
                <th>№</th>
                <th>English</th>
                <th>Transcription</th>
                <th>Հայերեն</th>
                <th>Level</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div style="height: 10vh"></div>

    <script src="The_Oxford_3000.js"></script>
    <script>
        const PAGINATION_ITEMS = [2, 5, 2];
        const PAGINATION_PAGES = (()=>{
            let sum = 0;
            PAGINATION_ITEMS.forEach((item, index) => {
                sum += item;
            });
            return sum;
        })();
        const ITEMS_PER_PAGE = 100;
        let currentPage = 1;
        let filteredWords = [];
        //pre-sort
        const levelOrder = ["A1", "A2", "B1", "B2", "C1", "C2"];
        const levelWeights = { "A1": 1, "A2": 2, "B1": 3, "B2": 4, "C1": 5, "C2": 6 };
        oxford_3000.sort((a, b)=>{
            // return levelOrder.indexOf(a.level) - levelOrder.indexOf(b.level);
            return levelWeights[a.level] - levelWeights[b.level];
        });
        // Standardize words from the loaded en_hy_0_2000 database
        const wordsList = oxford_3000.map((w, index) => {
            let transcription = w.t || "";

            return {
                index: index + 1,
                en: w.w,
                t: transcription ? transcription : '',
                hy: w.hy || '',
                l: w.level || "A0"
            }
        });


        const searchInput = document.getElementById('search');
        const clearBtn = document.getElementById('clear_btn');
        const countSpan = document.getElementById('count');
        const paginationDiv = document.getElementById('pagination');
        const tbody = document.getElementById('tbody');

        function speakWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function filterWords() {
            const query = searchInput.value.toLowerCase().trim()
            if (!query) {
                filteredWords = [...wordsList];
            } else {
                filteredWords = wordsList.filter(w => {
                    return w.en.toLowerCase().includes(query) ||
                        w.hy.toLowerCase().includes(query)
                })
            }
            if (clearBtn) {
                clearBtn.style.display = query ? 'block' : 'none';
            }
            currentPage = 1;
            renderTable();
            renderPagination();
        }

        function renderTable() {
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, filteredWords.length);
            const pageItems = filteredWords.slice(startIndex, endIndex);

            tbody.innerHTML = '';

            if (pageItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 25px; color: var(--c4); font-size: 15px;">No words found / Բառեր չեն գտնվել</td></tr>`;
                countSpan.textContent = `Found: 0 words`;
                return;
            }

            pageItems.forEach(w => {
                const tr = document.createElement('tr');

                const tdIndex = document.createElement('td');
                tdIndex.textContent = w.index;

                const tdEn = document.createElement('td');
                tdEn.textContent = w.en;
                tdEn.title = "Click to pronounce / Սեղմեք արտասանելու համար";
                tdEn.addEventListener('click', () => speakWord(w.en));

                const tdT = document.createElement('td');
                tdT.textContent = w.t;

                const tdHy = document.createElement('td');
                tdHy.textContent = w.hy;

                const tdL = document.createElement('td');
                tdL.textContent = w.l;

                tr.appendChild(tdIndex);
                tr.appendChild(tdEn);
                tr.appendChild(tdT);
                tr.appendChild(tdHy);
                tr.appendChild(tdL);

                tbody.appendChild(tr);
            });

            countSpan.textContent = `Showing ${startIndex + 1}-${endIndex} of ${filteredWords.length}`;
        }

        function renderPagination() {
            paginationDiv.innerHTML = '';
            const totalPages = Math.ceil(
                filteredWords.length / ITEMS_PER_PAGE
            );
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '‹';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                    renderPagination();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }
            })
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '›';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                    renderPagination();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }
            })


            if (totalPages <= 1) {
                return;
            }else if(totalPages <= PAGINATION_PAGES + 2) {
                paginationDiv.appendChild(prevBtn);
                for(let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i.toString();
                    if(currentPage === i){
                        btn.classList.add('active');
                    }
                    btn.addEventListener('click', () => {
                        currentPage = i;
                        renderTable();
                        renderPagination();
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    })
                    paginationDiv.appendChild(btn);
                }
                paginationDiv.appendChild(nextBtn);
                return;
            }

            let buttons = [];
            paginationDiv.appendChild(prevBtn);
            let i1 = 1;
            let i2 = PAGINATION_ITEMS[0];
            for(let i = i1; i <= i2; i++) {
                buttons.push(i.toString());
            }

            let startI = currentPage - Math.floor((PAGINATION_ITEMS[1] - 1) / 2);
            let endI = startI + PAGINATION_ITEMS[1] - 1;
            if(startI <= i2 + 2){
                buttons.push((i2 + 1).toString());
                startI = i2 + 2;
                endI = startI + PAGINATION_ITEMS[1] - 1;
            }else{
                buttons.push('...');
            }

            let j1 = totalPages - PAGINATION_ITEMS[2] + 1;
            let j2 = totalPages;

            if(endI > j1 - 2){
                endI = j1 - 2;
                startI = endI - PAGINATION_ITEMS[1] + 1;
            }

            for(let i = startI; i <= endI; i++) {
                buttons.push(i.toString());
            }

            if(endI < j1 - 2){
                buttons.push('...');
            }else if(j1 - 1 >= i2 + 2){
                buttons.push((j1 - 1).toString());

            }

            for(let i = j1; i <= j2; i++) {
                buttons.push(i.toString());
            }

            buttons.forEach((button) => {
                if(button ==='...'){
                    const span = document.createElement('span');
                    span.textContent = button.toString();
                    paginationDiv.appendChild(span);
                    return;
                }
                const btn = document.createElement('button');
                btn.textContent = button;
                if(button === currentPage.toString()){
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    currentPage = parseInt(button);
                    renderTable();
                    renderPagination();
                    window.scrollTo({top: 0, behavior: 'smooth'});
                })
                paginationDiv.appendChild(btn);
            });

            paginationDiv.appendChild(nextBtn);
        }

        searchInput.addEventListener('input', filterWords)
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                filterWords();
                searchInput.focus();
            })
        }

        // Initial render
        filterWords();
    </script>
</body>

</html>
