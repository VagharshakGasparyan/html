<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>English 2 — 700 Words</title>
    <style>
        :root {
            --bg: #112233;
            --c: #dddddd;
            --c1: #5f5;
            --c2: #7af;
            --c3: #a70;
            --c4: #f59;
            --c5: #ff4;
            --bd: #fff2;
            --bd1: #fff4;
        }

        ::selection {
            background: #f07;
            color: #ff0;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-family: Consolas, sans-serif;
            background-color: var(--bg);
            color: var(--c);
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: var(--c5);
            font-size: 20px;
            margin: 15px 0 10px 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px auto;
            position: sticky;
            top: 0;
            z-index: 999;
            background-color: var(--bg);
            padding: 10px 0;
            border-bottom: 1px solid var(--bd);
            flex-wrap: wrap;
            max-width: 900px;
        }

        #search {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd1);
            padding: 6px 30px 6px 15px;
            font-size: 15px;
            font-family: Consolas, sans-serif;
            outline: none;
            width: 280px;
            border-radius: 4px;
            transition: border-color 0.15s ease-in-out;
        }

        .search-container {
            position: relative;
            display: inline-block;
        }

        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--bd1);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: none;
            transition: color 0.15s ease;
            line-height: 1;
        }

        .clear-btn:hover {
            color: var(--c4);
        }

        #search:focus {
            border-color: var(--c2);
        }

        #count {
            color: var(--c3);
            font-size: 14px;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .pagination button {
            background-color: var(--bg);
            color: var(--c);
            border: 1px solid var(--bd);
            padding: 5px 10px;
            cursor: pointer;
            font-family: Consolas, sans-serif;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .pagination button:hover {
            background-color: var(--bd1);
        }

        .pagination button.active {
            background-color: var(--c2);
            color: var(--bg);
            border-color: var(--c2);
            font-weight: bold;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .pagination span {
            color: var(--c);
            padding: 5px 10px;
            font-family: Consolas, sans-serif;
            font-size: 14px;
            user-select: none;
        }

        .table {
            border-collapse: collapse;
            font-size: 14px;
            margin: 15px auto;
            width: 100%;
            max-width: 900px;
        }

        .table th {
            border: 1px solid var(--bd1);
            padding: 8px 12px;
            color: var(--c5);
            position: sticky;
            top: 50px;
            background-color: var(--bg);
            z-index: 998;
        }

        .table td {
            border: 1px solid var(--bd);
            padding: 6px 12px;
        }

        .table tbody tr:hover {
            background-color: #fff1;
        }

        .table tbody tr td:nth-child(1) {
            color: var(--c3);
            text-align: right;
            width: 60px;
        }

        .table tbody tr td:nth-child(2) {
            color: var(--c1);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: color 0.15s ease;
        }

        .table tbody tr td:nth-child(2):hover {
            color: var(--c5);
            text-decoration: underline;
        }

        .table tbody tr td:nth-child(3) {
            color: var(--c);
        }

        .table tbody tr td:nth-child(4) {
            color: var(--c2);
        }
    </style>
</head>

<body>
    <h1>700 Most Common English Words</h1>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="search" placeholder="Search / Որոնել...">
            <button id="clear_btn" class="clear-btn" type="button" title="Clear search / Ջնջել որոնումը">✕</button>
        </div>
        <span id="count"></span>
        <div class="pagination" id="pagination"></div>
    </div>

    <table class="table" id="words_table">
        <thead>
            <tr>
                <th>№</th>
                <th>English</th>
                <th>Transcription</th>
                <th>Հայերեն</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div style="height: 10vh"></div>

    <script src="en_hy_0_2000.js"></script>
    <script>
        const ITEMS_PER_PAGE = 100;
        let currentPage = 1;
        let filteredWords = [];


        // Manual fixes for transcription typos or formatting issues in the database
        const TRANSCRIPTION_FIXES = {
            "them": "ðem",
            "foot": "fʊt",
            "us": "ʌs",
            "use": "juːz",
            "live": "lɪv",
            "catch": "kætʃ",
            "wind": "wɪnd",
            "an": "ən",
            "coach": "koʊtʃ",
            "Aslan": "ˈæzlæn",
            "HMI": "ˌeɪtʃ em ˈaɪ",
            "Linest": "laɪnst",
            "Andrew": "ˈændruː",
            "Edmund": "ˈedmənd",
            "John": "dʒɒn",
            "Moscow": "ˈmɒskəʊ",
            "Narnia": "ˈnɑːniə",
            "Oh": "əʊ",
            "beaver": "ˈbiːvər",
            "dim": "dɪm",
            "loop": "luːp",
            "tope": "toʊp",
            "route": "ruːt"
        };

        // Standardize words from the loaded en_hy_0_2000 database
        const wordsList = en_hy_0_2000.slice(0, 2000).map((w, index) => {
            let transcription = w.t || "";
            if (TRANSCRIPTION_FIXES[w.en]) {
                transcription = TRANSCRIPTION_FIXES[w.en];
            }
            return {
                index: index + 1,
                en: w.en,
                t: transcription ? '/' + transcription + '/' : '',
                hy: w.hy || ''
            }
        });


        const searchInput = document.getElementById('search');
        const clearBtn = document.getElementById('clear_btn');
        const countSpan = document.getElementById('count');
        const paginationDiv = document.getElementById('pagination');
        const tbody = document.getElementById('tbody');

        function speakWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function filterWords() {
            const query = searchInput.value.toLowerCase().trim()
            if (!query) {
                filteredWords = [...wordsList]
            } else {
                filteredWords = wordsList.filter(w => {
                    return w.en.toLowerCase().includes(query) ||
                        w.hy.toLowerCase().includes(query)
                })
            }
            if (clearBtn) {
                clearBtn.style.display = query ? 'block' : 'none'
            }
            currentPage = 1
            renderTable()
            renderPagination()
        }

        function renderTable() {
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, filteredWords.length);
            const pageItems = filteredWords.slice(startIndex, endIndex);

            tbody.innerHTML = '';

            if (pageItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 25px; color: var(--c4); font-size: 15px;">No words found / Բառեր չեն գտնվել</td></tr>`;
                countSpan.textContent = `Found: 0 words`;
                return;
            }

            pageItems.forEach(w => {
                const tr = document.createElement('tr');

                const tdIndex = document.createElement('td');
                tdIndex.textContent = w.index;

                const tdEn = document.createElement('td');
                tdEn.textContent = w.en;
                tdEn.title = "Click to pronounce / Սեղմեք արտասանելու համար";
                tdEn.addEventListener('click', () => speakWord(w.en));

                const tdT = document.createElement('td');
                tdT.textContent = w.t;

                const tdHy = document.createElement('td');
                tdHy.textContent = w.hy;

                tr.appendChild(tdIndex);
                tr.appendChild(tdEn);
                tr.appendChild(tdT);
                tr.appendChild(tdHy);

                tbody.appendChild(tr);
            });

            countSpan.textContent = `Showing ${startIndex + 1}-${endIndex} of ${filteredWords.length}`;
        }

        function renderPagination() {
            paginationDiv.innerHTML = ''
            const totalPages = Math.ceil(
                filteredWords.length / ITEMS_PER_PAGE
            )

            if (totalPages <= 1) {
                return
            }

            // Prev Button
            const prevBtn = document.createElement('button')
            prevBtn.textContent = '‹'
            prevBtn.disabled = currentPage === 1
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--
                    renderTable()
                    renderPagination()
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth',
                    })
                }
            })
            paginationDiv.appendChild(prevBtn);

            // Determine page numbers to display
            const pages = new Set()
            pages.add(1)
            if (totalPages >= 2) {
                pages.add(2)
            }
            if (totalPages >= 1) {
                pages.add(totalPages)
            }
            if (totalPages >= 2) {
                pages.add(totalPages - 1)
            }

            const startRange = Math.max(1, currentPage - 3)
            const endRange = Math.min(totalPages, currentPage + 3)
            for (let i = startRange; i <= endRange; i++) {
                pages.add(i)
            }

            const sortedPages = Array.from(pages).sort((a, b) => a - b)

            let prevPage = 0
            for (const page of sortedPages) {
                if (prevPage !== 0) {
                    if (page - prevPage > 1) {
                        const dots = document.createElement('span');
                        dots.textContent = '...';
                        paginationDiv.appendChild(dots);
                    }
                }

                const btn = document.createElement('button')
                btn.textContent = page
                if (page === currentPage) {
                    btn.classList.add('active')
                }
                btn.addEventListener('click', () => {
                    currentPage = page
                    renderTable()
                    renderPagination()
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth',
                    })
                })
                paginationDiv.appendChild(btn)
                prevPage = page
            }

            // Next Button
            const nextBtn = document.createElement('button')
            nextBtn.textContent = '›'
            nextBtn.disabled = currentPage === totalPages
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++
                    renderTable()
                    renderPagination()
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth',
                    })
                }
            })
            paginationDiv.appendChild(nextBtn)
        }

        searchInput.addEventListener('input', filterWords)
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                searchInput.value = ''
                filterWords()
                searchInput.focus()
            })
        }

        // Initial render
        filterWords()
    </script>
</body>

</html>
